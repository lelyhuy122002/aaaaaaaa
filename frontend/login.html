<!DOCTYPE html>
<html lang="vi" data-lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="auth.modal.title">Đăng nhập vào Blankup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page-body">

  <!-- Background decorative blurs -->
  <div class="login-decor login-decor-1"></div>
  <div class="login-decor login-decor-2"></div>

  <!-- ====== HEADER / LOGO ====== -->
  <header class="login-header">
    <div class="container">
      <a href="/" class="navbar-logo">
        <svg class="logo-icon" viewBox="0 0 38 38" fill="none">
          <rect width="38" height="38" rx="10" fill="#ff6b00"/>
          <path d="M10 14 L14 10 L24 10 L28 14 L26 14 L26 28 L12 28 L12 14 Z" fill="white" opacity="0.9"/>
          <path d="M16 10 L19 6 L22 10" stroke="white" stroke-width="1.5" fill="none"/>
          <path d="M22 18 L28 12" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <circle cx="29" cy="11" r="2" fill="white"/>
        </svg>
        <span>BLANK<span class="logo-highlight">UP</span></span>
      </a>

      <div class="lang-toggle" id="langToggle">
        <span class="lang-vi active" data-lang="vi">VI</span>
        <span class="lang-en" data-lang="en">EN</span>
      </div>
    </div>
  </header>

  <!-- ====== LOGIN CARD CONTAINER ====== -->
  <main class="login-main">
    <div class="login-card animate-fade-in">
      <div class="login-card-header">
        <h2 id="loginTitle" data-i18n="auth.modal.title">Đăng nhập vào Blankup</h2>
        <p id="loginSubtitle" data-i18n="hero.badge">✨ Nền tảng thiết kế áo AI đầu tiên</p>
      </div>

      <form id="loginForm">
        <!-- Full Name (Only visible in Register mode) -->
        <div class="form-group" id="fullNameGroup" style="display: none;">
          <label data-i18n="auth.modal.fullName">Họ và tên</label>
          <input type="text" class="form-input" id="loginFullName" 
            data-i18n-placeholder="auth.modal.fullName" placeholder="Họ và tên">
        </div>

        <!-- Username -->
        <div class="form-group">
          <label data-i18n="auth.modal.username">Tên đăng nhập</label>
          <input type="text" class="form-input" id="loginUsername" 
            data-i18n-placeholder="auth.modal.username" placeholder="Tên đăng nhập" required>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label data-i18n="auth.modal.password">Mật khẩu</label>
          <input type="password" class="form-input" id="loginPassword" 
            data-i18n-placeholder="auth.modal.password" placeholder="Mật khẩu" required>
        </div>

        <!-- Error Msg -->
        <div class="auth-error" id="loginErrorMsg" style="display: none;"></div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 10px;" id="loginSubmitBtn">
          <span id="loginSubmitText" data-i18n="auth.modal.loginBtn">Đăng nhập</span>
        </button>
      </form>

      <!-- Toggle Link -->
      <div class="auth-switch">
        <span id="loginSwitchPrompt" data-i18n="auth.modal.noAccount">Chưa có tài khoản?</span>
        <button id="loginSwitchBtn" data-i18n="auth.modal.switchToRegister">Đăng ký ngay</button>
      </div>

      <!-- Return Link -->
      <div class="return-home">
        <a href="/" class="btn-back">← <span data-i18n="nav.home">Quay lại Trang chủ</span></a>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
